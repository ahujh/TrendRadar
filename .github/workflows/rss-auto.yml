name: RSS Push To DingTalk
on:
  schedule:
    # 每5分钟执行一次，可自行修改 cron 表达式
    - cron: '*/5 * * * *'
  push:
    branches: [ master ]

jobs:
  run-rss:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行RSS推送脚本
        env:
          DING_WEBHOOK: ${{ secrets.DING_WEBHOOK }}
          DING_SECRET: ${{ secrets.DING_SECRET }}
        run: python rss.py
